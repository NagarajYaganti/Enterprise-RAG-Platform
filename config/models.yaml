# Model registry. Every entry MUST be marked verified_before_deploy: false
# until a human confirms it against the provider's official docs (see CLAUDE.md
# anti-hallucination rules). No model_id is ever hardcoded in business logic —
# code reads this file at runtime via ModelRouter.
#
# schema per entry (populated starting Phase 2 embeddings / Phase 4 routing):
#   id: str                        # provider's model identifier
#   provider: str                  # e.g. openai, anthropic, cohere, huggingface, self-hosted
#   task: str                      # embedding | generation | rerank | stt | ocr
#   version: str                   # OUR internal config revision for this entry (not the
#                                   # provider's own model version) — bump when re-pinning
#                                   # this entry to a different id/params, so EmbeddingRecord
#                                   # can distinguish "same model_id, re-verified config" too
#   dimensions: int | null         # embedding output size; required for embedding-task entries
#   cost_per_1k_tokens: float | null  # null if not yet verified from a live source
#   latency_class: str             # e.g. low | medium | high
#   languages: list[str]
#   context_window: int | null     # max input tokens; required for generation-task entries
#                                   # (Phase 4 retrofit, ContextPolicy); null elsewhere
#   verified_before_deploy: bool   # human has confirmed id/pricing against provider docs
#   verified_date: str | null      # ISO date of last verification
#   verified_by: str | null

models:
  - id: tiny
    provider: faster-whisper
    task: stt
    version: "1"
    dimensions: null
    cost_per_1k_tokens: 0.0
    latency_class: low
    languages: ["en"]
    context_window: null
    verified_before_deploy: false
    verified_date: null
    verified_by: null

