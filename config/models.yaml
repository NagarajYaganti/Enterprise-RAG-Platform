  # cost_per_1k_tokens is ASSUMPTION: null — per-token pricing could not be
  # confirmed from a live source this session (OpenAI's pricing page blocked
  # the fetch; Cohere's pricing page only showed hourly/monthly instance
  # rates, not per-token). Do not fabricate a plausible-looking number —
  # a human must fill this in from a verified source before deploy.
  - id: BAAI/bge-small-en-v1.5
    provider: huggingface
    task: embedding
    version: "1"
    dimensions: 384
    cost_per_1k_tokens: 0.0   # genuinely free — runs locally, no per-token cost
