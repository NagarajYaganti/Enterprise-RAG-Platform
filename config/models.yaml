# Model registry. Every entry MUST be marked verified_before_deploy: false
# until a human confirms it against the provider's official docs (see CLAUDE.md
# anti-hallucination rules). No model_id is ever hardcoded in business logic —
# code reads this file at runtime via ModelRouter.
#
# schema per entry (populated starting Phase 2 embeddings / Phase 4 routing):
#   id: str                        # provider's model identifier
#   provider: str                  # e.g. openai, anthropic, cohere, huggingface, self-hosted
#   task: str                      # embedding | generation | rerank | stt | ocr
#   version: str                   # OUR internal config revision for this entry (not the
#                                   # provider's own model version) — bump when re-pinning
#                                   # this entry to a different id/params, so EmbeddingRecord
#                                   # can distinguish "same model_id, re-verified config" too
#   dimensions: int | null         # embedding output size; required for embedding-task entries
#   cost_per_1k_tokens: float | null  # null if not yet verified from a live source
#   latency_class: str             # e.g. low | medium | high
#   languages: list[str]
#   verified_before_deploy: bool   # human has confirmed id/pricing against provider docs
#   verified_date: str | null      # ISO date of last verification
#   verified_by: str | null

models:
  - id: tiny
    provider: faster-whisper
    task: stt
    version: "1"
    dimensions: null
    cost_per_1k_tokens: 0.0
    latency_class: low
    languages: ["en"]
    verified_before_deploy: false
    verified_date: null
    verified_by: null

  # id/dimensions below were fetched from provider docs during planning
  # (2026-07-19) — https://developers.openai.com/api/docs/guides/embeddings
  # and https://docs.cohere.com/docs/cohere-embed — not from memory.
  # cost_per_1k_tokens is ASSUMPTION: null — per-token pricing could not be
  # confirmed from a live source this session (OpenAI's pricing page blocked
  # the fetch; Cohere's pricing page only showed hourly/monthly instance
  # rates, not per-token). Do not fabricate a plausible-looking number —
  # a human must fill this in from a verified source before deploy.
  - id: BAAI/bge-small-en-v1.5
    provider: huggingface
    task: embedding
    version: "1"
    dimensions: 384
    cost_per_1k_tokens: 0.0   # genuinely free — runs locally, no per-token cost
    latency_class: low
    languages: ["en"]
    verified_before_deploy: false
    verified_date: null
    verified_by: null

  - id: text-embedding-3-small
    provider: openai
    task: embedding
    version: "1"
    dimensions: 1536
    cost_per_1k_tokens: null   # ASSUMPTION: unverified, see note above
    latency_class: low
    languages: ["multilingual"]
    verified_before_deploy: false
    verified_date: null
    verified_by: null

  - id: embed-v4.0
    provider: cohere
    task: embedding
    version: "1"
    dimensions: 1536
    cost_per_1k_tokens: null   # ASSUMPTION: unverified, see note above
    latency_class: low
    languages: ["multilingual"]
    verified_before_deploy: false
    verified_date: null
    verified_by: null

  # id below was confirmed via a raw `curl` of the HuggingFace Hub API
  # during Phase 3 planning (2026-07-20) — a direct, unmediated JSON
  # response, not a paraphrase. High confidence on the id itself; pricing/
  # deploy suitability still require human sign-off per policy.
  - id: cross-encoder/ms-marco-MiniLM-L6-v2
    provider: huggingface
    task: rerank
    version: "1"
    dimensions: null
    cost_per_1k_tokens: 0.0   # genuinely free — runs locally, no per-token cost
    latency_class: low
    languages: ["en"]
    verified_before_deploy: false
    verified_date: null
    verified_by: null

  # id below is cited from Cohere's rerank docs (docs.cohere.com/v2/docs/
  # rerank-overview), fetched during Phase 3 planning (2026-07-20).
  # cost_per_1k_tokens is ASSUMPTION: Cohere prices rerank per search unit,
  # not per token — no per-1k-token figure could be honestly derived from
  # the fetched page. Do not fabricate a converted number.
  - id: rerank-v3.5
    provider: cohere
    task: rerank
    version: "1"
    dimensions: null
    cost_per_1k_tokens: null   # ASSUMPTION: unverified, see note above
    latency_class: low
    languages: ["multilingual"]
    verified_before_deploy: false
    verified_date: null
    verified_by: null

  # id and the $1/M-input-token figure below came from a WebFetch of
  # developers.openai.com/api/docs/models during Phase 3 planning
  # (2026-07-20). WebFetch summarizes fetched content through an
  # intermediate model before returning it (per the tool's own
  # description) — this is one step removed from a raw API/docs response,
  # unlike the HuggingFace entries above which came from raw curl JSON.
  # Treat this id and price as LOWER CONFIDENCE than the other entries in
  # this file — a human must re-verify directly against the live page
  # before deploy, not just re-trust this fetch.
  - id: gpt-5.6-luna
    provider: openai
    task: generation
    version: "1"
    dimensions: null
    cost_per_1k_tokens: 0.001   # derived from "$1 / Input MTok" ÷ 1000; output price unconfirmed
    latency_class: low
    languages: ["multilingual"]
    verified_before_deploy: false
    verified_date: null
    verified_by: null

  # GraphRAG (optional, flagged OFF by default): local NER model for entity
  # extraction, not an LLM. id/compatibility (spacy>=3.8.0,<3.9.0) verified
  # against the real explosion/spacy-models GitHub release and installed
  # locally during Phase 3 (2026-07-20) — pinned as a direct wheel
  # dependency in libs/connectors/pyproject.toml, not a runtime download.
  - id: en_core_web_sm
    provider: spacy
    task: ner
    version: "1"
    dimensions: null
    cost_per_1k_tokens: 0.0   # genuinely free — runs locally, no per-token cost
    latency_class: low
    languages: ["en"]
    verified_before_deploy: false
    verified_date: null
    verified_by: null
