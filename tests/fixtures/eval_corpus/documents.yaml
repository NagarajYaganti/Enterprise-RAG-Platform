# Dedicated Phase-3 retrieval eval corpus. NOT the 8 Phase-1 format-parsing
# fixtures (sample.pdf/docx/etc.) — those are too small (1 chunk each,
# completely disjoint vocabulary) to produce a meaningful hybrid-vs-single-
# method or reranker delta: with only 8 near-trivial chunks, every method
# scores ~perfectly and there's no real ranking competition. This corpus is
# built specifically to have deliberate topical/lexical overlap (multiple
# lending docs, multiple compliance docs, multiple clinical docs) so
# retrieval methods actually have something to compete on. Every document
# is real, human-authored short-form business text (synthetic BFSI/Retail/
# Healthcare content), not fabricated benchmark numbers — no claim here is
# presented as a real company's data.
#
# tenant_id is fixed at "tenant-eval" for the whole corpus.

