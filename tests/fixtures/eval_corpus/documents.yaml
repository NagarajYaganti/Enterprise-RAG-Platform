  # doc-21/doc-22: deliberately opaque alphanumeric reference codes. Dense
  # sentence embeddings carry little useful signal for arbitrary codes like
  # this (subword tokenization scrambles them, and there's no semantic
  # "meaning" to embed) — real cases where exact lexical match (BM25) has a
  # genuine advantage over semantic search, not just topical overlap.
  - id: doc-21
    text: "Reference code TX-88214-B applies to all international remittance transactions exceeding five thousand dollars."
    doc_type: policy
